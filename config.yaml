# f1pred configuration. Override any value with an env var prefixed F1PRED_,
# e.g. F1PRED_SEASONS='[2023,2024,2025,2026]'. See src/f1pred/config.py.

# Seasons to ingest. 2018+ = full FastF1 telemetry era.
seasons: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]

# The season we ultimately forecast.
target_season: 2026

paths:
  data_root: data
  raw_dir: data/raw          # ingested parquet (session results, laps, weather)
  features_dir: data/features
  fastf1_cache: data/cache/fastf1
  models_dir: models
  predictions_dir: data/predictions

ingest:
  # Which FastF1 session types to load per event.
  sessions: ["Q", "R"]       # Qualifying + Race (add "S" for sprints)
  load_telemetry: false      # heavy; enable per-run when building pace features
  jolpica_base_url: "https://api.jolpi.ca/ergast/f1"

features:
  form_windows: [3, 5, 10]   # rolling-window sizes (races) for driver/constructor form

model:
  seed: 42
  # LightGBM LGBMRanker params (LambdaMART).
  params:
    objective: "lambdarank"
    metric: "ndcg"
    n_estimators: 300
    learning_rate: 0.03
    num_leaves: 15
    min_child_samples: 30
    subsample: 0.8
    colsample_bytree: 0.7
    reg_lambda: 1.0
    min_split_gain: 0.0
    verbosity: -1
  eval_at: [1, 3, 10]        # NDCG@k / top-k reporting

backtest:
  # Rolling-origin: first season used only for warm-up history.
  min_train_season: 2019
  eval_seasons: [2023, 2024, 2025, 2026]

tracking:
  mlflow_uri: "file:./mlruns"
  experiment: "f1pred"
